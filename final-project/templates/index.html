<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Poker Room Tables</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <a href="#" class="admin-login">Admin Login</a>
    </header>

    <main class="table-grid">

        <a href="{{ url_for('join', table_name='1/3 NL Holdem') }}" class="poker-table">
            <span>1/3 NL Holdem</span>
            <span>7/9 Seats</span>
            <span>0 Waiting</span>
        </a>

        <a href="{{ url_for('join', table_name='2/5 NL Holdem') }}" class="poker-table">
            <span>2/5 NL Holdem</span>
            <span>9/9 Seats</span>
            <span>3 Waiting</span>
        </a>

        <a href="{{ url_for('join', table_name='5/10 NL Holdem') }}" class="poker-table">
            <span>5/10 NL Holdem</span>
            <span>9/9 Seats</span>
            <span>1 Waiting</span>
        </a>

        <a href="{{ url_for('join', table_name='1/2 PLO') }}" class="poker-table">
            <span>1/2 PLO</span>
            <span>6/6 Seats</span>
            <span>4 Waiting</span>
        </a>

        <a href="{{ url_for('join', table_name='2/5 PLO') }}" class="poker-table">
            <span>2/5 PLO</span>
            <span>4/6 Seats</span>
            <span>0 Waiting</span>
        </a>

        <a href="{{ url_for('join', table_name='1/3 LIMIT Holdem') }}" class="poker-table">
            <span>1/3 LIMIT Holdem</span>
            <span>4/9 Seats</span>
            <span>0 Waiting</span>
        </a>

    </main>

</body>
</html>
