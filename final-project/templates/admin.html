<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
</head>
<body>

    <h1>Admin Login</h1>

        {% if error %}
            <p>{{ error }}</p>
        {% endif %}
        <form method="POST">
            <label for="password">Admin Password:</label>
            <input
                type="password"
                id="password"
                name="password"
                required
            >

            <button type="submit">Log In</button>
        </form>

    <p>
        <a href="{{ url_for('index') }}">Return to Tables</a>
    </p>

</body>
</html>
